 U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n  <style>/* ============================================================\n   CCBT — Color tokens\n   Centrul Cultural Botoșani\n\n   Disciplined palette:\n     PRIMARY    purple   #5F0058\n     SECONDARY  coral    #E84935\n     ACCENT 1   cyan     #5ED9FC\n     ACCENT 2   green    #009E5C\n   Two accents, max. Everything else is a neutral or a surface tint.\n   ============================================================ */\n\n:root {\n  /* ---- Primary (purple) ---- */\n  --ccbt-purple:        #5F0058;\n  --ccbt-purple-deep:   #44003F; /* pressed / darker */\n  --ccbt-purple-tint:   #7A1A72; /* hover lift */\n\n  /* ---- Secondary (coral) ---- */\n  --ccbt-coral:         #E84935;\n  --ccbt-coral-bright:  #FB3524; /* logo dots / mosaic red */\n  --ccbt-coral-deep:    #B03A2E; /* pressed */\n\n  /* ---- Accents (only these two) ---- */\n  --ccbt-cyan:          #5ED9FC; /* accent 1 */\n  --ccbt-green:         #009E5C; /* accent 2 */\n  --ccbt-cyan-soft:     #E6F8FF; /* accent-1 background tint */\n  --ccbt-green-soft:    #E1F4EC; /* accent-2 background tint */\n\n  /* ---- Neutrals ---- */\n  --ccbt-ink:           #201D1E; /* near-black text */\n  --ccbt-black:         #000000;\n  --ccbt-gray-700:      #525252;\n  --ccbt-gray-500:      #767474;\n  --ccbt-gray-300:      #D9D9D9;\n  --ccbt-gray-150:      #F3F3F3;\n  --ccbt-base:          #F1F3FB; /* cool off-white page base */\n  --ccbt-lavender-bg:   #F5E8FF; /* soft purple-tint section background */\n  --ccbt-white:         #FFFFFF;\n\n  /* ============================================================\n     Semantic aliases — author against these in components\n     ============================================================ */\n  --color-primary:         var(--ccbt-purple);\n  --color-primary-hover:   var(--ccbt-purple-tint);\n  --color-primary-active:  var(--ccbt-purple-deep);\n  --color-on-primary:      var(--ccbt-white);\n\n  --color-secondary:        var(--ccbt-coral);\n  --color-secondary-hover:  var(--ccbt-coral-deep);\n  --color-secondary-active: var(--ccbt-coral-deep);\n  --color-on-secondary:     var(--ccbt-white);\n\n  /* back-compat: \"action\" is the secondary coral */\n  --color-action:          var(--ccbt-coral);\n  --color-action-hover:    var(--ccbt-coral-deep);\n  --color-action-active:   var(--ccbt-coral-deep);\n  --color-on-action:       var(--ccbt-white);\n\n  --color-accent-1:        var(--ccbt-cyan);\n  --color-accent-2:        var(--ccbt-green);\n\n  /* Surfaces */\n  --surface-page:          var(--ccbt-base);\n  --surface-card:          var(--ccbt-white);\n  --surface-raised:        var(--ccbt-white);\n  --surface-inverse:       var(--ccbt-purple);\n  --surface-soft:          var(--ccbt-lavender-bg);\n  --surface-muted:         var(--ccbt-gray-150);\n\n  /* Text */\n  --text-strong:           var(--ccbt-ink);\n  --text-body:             var(--ccbt-gray-700);\n  --text-muted:            var(--ccbt-gray-500);\n  --text-on-dark:          var(--ccbt-white);\n  --text-heading:          var(--ccbt-purple);\n  --text-accent:           var(--ccbt-coral);\n\n  /* Lines & borders */\n  --border-subtle:         var(--ccbt-gray-300);\n  --border-strong:         var(--ccbt-ink);\n\n  /* Logo recolor hooks (consumed by Logo.jsx) */\n  --logo-primary:          var(--ccbt-purple);\n  --logo-accent:           var(--ccbt-coral-bright);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   CCBT — Typography tokens\n   ============================================================ */\n\n:root {\n  /* Families */\n  --font-display: 'Barlow Condensed', 'Inter', sans-serif; /* tall condensed caps */\n  --font-sans:    'Inter', system-ui, sans-serif;          /* wordmark + UI + alt display */\n  --font-body:    'Barlow', 'Inter', sans-serif;           /* running text */\n\n  /* Weights */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium:  500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold:    700; /* @kind font */\n  --fw-extra:   800; /* @kind font */\n\n  /* Display scale — Barlow Condensed, uppercase, tight */\n  --display-2xl: 128px;\n  --display-xl:  96px;\n  --display-lg:  72px;\n  --display-md:  56px;\n  --display-sm:  40px;\n\n  /* Headings */\n  --heading-xl: 40px;\n  --heading-lg: 32px;\n  --heading-md: 24px;\n  --heading-sm: 20px;\n\n  /* Body */\n  --body-lg: 20px;\n  --body-md: 16px;\n  --body-sm: 14px;\n  --label:   13px; /* eyebrows / tags, uppercase tracked */\n\n  /* Line heights */\n  --lh-display: 0.92; /* @kind other */\n  --lh-tight:   1.05; /* @kind other */\n  --lh-snug:    1.25; /* @kind other */\n  --lh-body:    1.55; /* @kind other */\n\n  /* Tracking */\n  --track-display: -0.01em; /* @kind other */\n  --track-label:   0.14em; /* @kind other */\n  --track-tight:   -0.02em; /* @kind other */\n}\n\n/* ---- Optional utility classes (consumers may use directly) ---- */\n.ccbt-display {\n  font-family: var(--font-display);\n  font-weight: var(--fw-semibold);\n  text-transform: uppercase;\n  line-height: var(--lh-display);\n  letter-spacing: var(--track-display);\n  color: var(--text-heading);\n}\n.ccbt-eyebrow {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-semibold);\n  font-size: var(--label);\n  text-transform: uppercase;\n  letter-spacing: var(--track-label);\n  color: var(--text-accent);\n}\n.ccbt-body {\n  font-family: var(--font-body);\n  font-weight: var(--fw-regular);\n  font-size: var(--body-md);\n  line-height: var(--lh-body);\n  color: var(--text-body);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   CCBT — Spacing, radius, shadow, layout tokens\n   ============================================================ */\n\n:root {\n  /* Spacing scale (4px base) */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  /* Radii — the brand leans crisp/square; small radii only */\n  --radius-none: 0px;\n  --radius-sm: 2px;\n  --radius-md: 4px;\n  --radius-lg: 8px;\n  --radius-pill: 999px;\n  --radius-brick: 3px; /* the rounded-rect \"brick\" unit from the logo */\n\n  /* Shadows — restrained, cool-tinted */\n  --shadow-sm: 0 1px 2px rgba(32, 29, 30, 0.08);\n  --shadow-md: 0 6px 20px rgba(32, 29, 30, 0.10);\n  --shadow-lg: 0 18px 48px rgba(68, 0, 63, 0.16);\n\n  /* Layout */\n  --content-max: 1280px;\n  --gutter: 80px;\n  --gutter-sm: 24px;\n\n  /* Brick motif sizing */\n  --brick-w: 14px;\n  --brick-h: 7px;\n  --brick-gap: 4px;\n\n  /* Motion */\n  --ease-out: cubic-bezier(0.22, 1, 0.36, 1); /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */\n  --dur-fast: 140ms; /* @kind other */\n  --dur: 220ms; /* @kind other */\n  --dur-slow: 420ms; /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   CCBT — Base element resets / page defaults\n   ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: var(--body-md);\n  line-height: var(--lh-body);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  margin: 0;\n  font-family: var(--font-display);\n  font-weight: var(--fw-semibold);\n  line-height: var(--lh-display);\n  letter-spacing: var(--track-display);\n  color: var(--text-heading);\n}\n\np { margin: 0; text-wrap: pretty; }\n\na { color: inherit; text-decoration: none; }\n\nimg { display: block; max-width: 100%; }\n\n::selection { background: var(--ccbt-coral); color: #fff; }\n<\u002Fstyle>\n  <style>/* ====================================================== F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"f1f6bc71-efbc-4d47-a514-b5ad15de2feb\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"ab8aef65-08bc-4f20-ab08-50123e409596\") format('woff2');\n  unicode-range: U+1F00-1FFF;\n}\n/* greek */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"43f68dfc-9492-4f3d-8621-8df9f0330701\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"6503fdd1-df11-443e-ad12-ea2171fd6936\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"feb42563-b50a-4d4f-97c1-d85c1727bdef\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"ae8cf950-d316-45d7-9627-62cc285cb186\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ============================================================\n   CCBT — Color tokens\n   Centrul Cultural Botoșani\n\n   Disciplined palette:\n     PRIMARY    purple   #5F0058\n     SECONDARY  coral    #E84935\n     ACCENT 1   cyan     #5ED9FC\n     ACCENT 2   green    #009E5C\n   Two accents, max. Everything else is a neutral or a surface tint.\n   ============================================================ */\n\n:root {\n  /* ---- Primary (purple) ---- */\n  --ccbt-purple:        #5F0058;\n  --ccbt-purple-deep:   #44003F; /* pressed / darker */\n  --ccbt-purple-tint:   #7A1A72; /* hover lift */\n\n  /* ---- Secondary (coral) ---- */\n  --ccbt-coral:         #E84935;\n  --ccbt-coral-bright:  #FB3524; /* logo dots / mosaic red */\n  --ccbt-coral-deep:    #B03A2E; /* pressed */\n\n  /* ---- Accents (only these two) ---- */\n  --ccbt-cyan:          #5ED9FC; /* accent 1 */\n  --ccbt-green:         #009E5C; /* accent 2 */\n  --ccbt-cyan-soft:     #E6F8FF; /* accent-1 background tint */\n  --ccbt-green-soft:    #E1F4EC; /* accent-2 background tint */\n\n  /* ---- Neutrals ---- */\n  --ccbt-ink:           #201D1E; /* near-black text */\n  --ccbt-black:         #000000;\n  --ccbt-gray-700:      #525252;\n  --ccbt-gray-500:      #767474;\n  --ccbt-gray-300:      #D9D9D9;\n  --ccbt-gray-150:      #F3F3F3;\n  --ccbt-base:          #F1F3FB; /* cool off-white page base */\n  --ccbt-lavender-bg:   #F5E8FF; /* soft purple-tint section background */\n  --ccbt-white:         #FFFFFF;\n\n  /* ============================================================\n     Semantic aliases — author against these in components\n     ============================================================ */\n  --color-primary:         var(--ccbt-purple);\n  --color-primary-hover:   var(--ccbt-purple-tint);\n  --color-primary-active:  var(--ccbt-purple-deep);\n  --color-on-primary:      var(--ccbt-white);\n\n  --color-secondary:        var(--ccbt-coral);\n  --color-secondary-hover:  var(--ccbt-coral-deep);\n  --color-secondary-active: var(--ccbt-coral-deep);\n  --color-on-secondary:     var(--ccbt-white);\n\n  /* back-compat: \"action\" is the secondary coral */\n  --color-action:          var(--ccbt-coral);\n  --color-action-hover:    var(--ccbt-coral-deep);\n  --color-action-active:   var(--ccbt-coral-deep);\n  --color-on-action:       var(--ccbt-white);\n\n  --color-accent-1:        var(--ccbt-cyan);\n  --color-accent-2:        var(--ccbt-green);\n\n  /* Surfaces */\n  --surface-page:          var(--ccbt-base);\n  --surface-card:          var(--ccbt-white);\n  --surface-raised:        var(--ccbt-white);\n  --surface-inverse:       var(--ccbt-purple);\n  --surface-soft:          var(--ccbt-lavender-bg);\n  --surface-muted:         var(--ccbt-gray-150);\n\n  /* Text */\n  --text-strong:           var(--ccbt-ink);\n  --text-body:             var(--ccbt-gray-700);\n  --text-muted:            var(--ccbt-gray-500);\n  --text-on-dark:          var(--ccbt-white);\n  --text-heading:          var(--ccbt-purple);\n  --text-accent:           var(--ccbt-coral);\n\n  /* Lines & borders */\n  --border-subtle:         var(--ccbt-gray-300);\n  --border-strong:         var(--ccbt-ink);\n\n  /* Logo recolor hooks (consumed by Logo.jsx) */\n  --logo-primary:          var(--ccbt-purple);\n  --logo-accent:           var(--ccbt-coral-bright);\n}\n\n/* ============================================================\n   CCBT — Typography tokens\n   ============================================================ */\n\n:root {\n  /* Families */\n  --font-display: 'Barlow Condensed', 'Inter', sans-serif; /* tall condensed caps */\n  --font-sans:    'Inter', system-ui, sans-serif;          /* wordmark + UI + alt display */\n  --font-body:    'Barlow', 'Inter', sans-serif;           /* running text */\n\n  /* Weights */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium:  500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold:    700; /* @kind font */\n  --fw-extra:   800; /* @kind font */\n\n  /* Display scale — Barlow Condensed, uppercase, tight */\n  --display-2xl: 128px;\n  --display-xl:  96px;\n  --display-lg:  72px;\n  --display-md:  56px;\n  --display-sm:  40px;\n\n  /* Headings */\n  --heading-xl: 40px;\n  --heading-lg: 32px;\n  --heading-md: 24px;\n  --heading-sm: 20px;\n\n  /* Body */\n  --body-lg: 20px;\n  --body-md: 16px;\n  --body-sm: 14px;\n  --label:   13px; /* eyebrows / tags, uppercase tracked */\n\n  /* Line heights */\n  --lh-display: 0.92; /* @kind other */\n  --lh-tight:   1.05; /* @kind other */\n  --lh-snug:    1.25; /* @kind other */\n  --lh-body:    1.55; /* @kind other */\n\n  /* Tracking */\n  --track-display: -0.01em; /* @kind other */\n  --track-label:   0.14em; /* @kind other */\n  --track-tight:   -0.02em; /* @kind other */\n}\n\n/* ---- Optional utility classes (consumers may use directly) ---- */\n.ccbt-display {\n  font-family: var(--font-display);\n  font-weight: var(--fw-semibold);\n  text-transform: uppercase;\n  line-height: var(--lh-display);\n  letter-spacing: var(--track-display);\n  color: var(--text-heading);\n}\n.ccbt-eyebrow {\n  font-family: var(--font-sans);\n  font-weight: var(--fw-semibold);\n  font-size: var(--label);\n  text-transform: uppercase;\n  letter-spacing: var(--track-label);\n  color: var(--text-accent);\n}\n.ccbt-body {\n  font-family: var(--font-body);\n  font-weight: var(--fw-regular);\n  font-size: var(--body-md);\n  line-height: var(--lh-body);\n  color: var(--text-body);\n}\n\n/* ============================================================\n   CCBT — Spacing, radius, shadow, layout tokens\n   ============================================================ */\n\n:root {\n  /* Spacing scale (4px base) */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  /* Radii — the brand leans crisp/square; small radii only */\n  --radius-none: 0px;\n  --radius-sm: 2px;\n  --radius-md: 4px;\n  --radius-lg: 8px;\n  --radius-pill: 999px;\n  --radius-brick: 3px; /* the rounded-rect \"brick\" unit from the logo */\n\n  /* Shadows — restrained, cool-tinted */\n  --shadow-sm: 0 1px 2px rgba(32, 29, 30, 0.08);\n  --shadow-md: 0 6px 20px rgba(32, 29, 30, 0.10);\n  --shadow-lg: 0 18px 48px rgba(68, 0, 63, 0.16);\n\n  /* Layout */\n  --content-max: 1280px;\n  --gutter: 80px;\n  --gutter-sm: 24px;\n\n  /* Brick motif sizing */\n  --brick-w: 14px;\n  --brick-h: 7px;\n  --brick-gap: 4px;\n\n  /* Motion */\n  --ease-out: cubic-bezier(0.22, 1, 0.36, 1); /* @kind other */\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1); /* @kind other */\n  --dur-fast: 140ms; /* @kind other */\n  --dur: 220ms; /* @kind other */\n  --dur-slow: 420ms; /* @kind other */\n}\n\n/* ============================================================\n   CCBT — Base element resets / page defaults\n   ============================================================ */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-size: var(--body-md);\n  line-height: var(--lh-body);\n  color: var(--text-body);\n  background: var(--surface-page);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, h2, h3, h4 {\n  margin: 0;\n  font-family: var(--font-display);\n  font-weight: var(--fw-semibold);\n  line-height: var(--lh-display);\n  letter-spacing: var(--track-display);\n  color: var(--text-heading);\n}\n\np { margin: 0; text-wrap: pretty; }\n\na { color: inherit; text-decoration: none; }\n\nimg { display: block; max-width: 100%; }\n\n::selection { background: var(--ccbt-coral); color: #fff; }\n\n<\u002Fstyle>\n  <style>\n    html, body { margin: 0; height: 100%; background: #F1F3FB; }\n    @media (max-width: 900px) {\n      .hero-wrap { align-items: flex-start; padding: 108px 32px 40px; overflow-y: auto; pointer-events: auto; }\n      .hero-title { font-size: 58px; }\n      .hero-sub { font-size: 18px; }\n      .hero-btn { font-size: 26px; padding: 20px 32px; }\n    }\n    @media (max-width: 460px) {\n      .hero-wrap { padding: 92px 22px 36px; }\n      .hero-title { font-size: 44px; }\n      .hero-sub { font-size: 16px; }\n      .hero-btn { font-size: 21px; padding: 17px 26px; gap: 12px; }\n    }\n    @media (max-height: 560px) and (max-width: 900px) {\n      .hero-wrap { padding-top: 84px; }\n      .hero-title { font-size: 40px; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div ref=\"{{ hostRef }}\" style=\"position: relative; width: 100vw; height: 100vh; overflow: hidden; background: #F1F3FB; font-family: 'Inter', system-ui, sans-serif;\">\n\n  <canvas ref=\"{{ baseRef }}\" style=\"position: absolute; inset: 0; width: 100%; height: 100%; display: block;\"><\u002Fcanvas>\n  <canvas ref=\"{{ partRef }}\" style=\"position: absolute; inset: 0; width: 100%; height: 100%; display: block; pointer-events: none;\"><\u002Fcanvas>\n\n  <!-- Brand mark -->\n  <div style=\"position: absolute; top: 40px; left: 56px; z-index: 3; pointer-events: none; display: flex; align-items: center; gap: 12px;\">\n    <img src=\"9432d9ee-3784-445e-93ec-302e0d849630\" alt=\"Alacrity\" style=\"height: 34px; width: auto; display: block;\">\n    <span style=\"font-family: 'Inter', sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.18em; color: #6550a3;\">ALACRITY<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- Administration area (top-right) -->\n  <div style=\"position: absolute; top: 40px; right: 56px; z-index: 3; display: flex; align-items: center; height: 34px;\">\n    <a href=\"{{ adminUrl }}\" style=\"pointer-events: auto; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: #6550a3; text-decoration: none; border: 1.5px solid #6550a3; border-radius: 4px; padding: 7px 13px; transition: background 180ms ease, color 180ms ease;\" style-hover=\"background: #6550a3; color: #FFFFFF;\">Administration area<\u002Fa>\n  <\u002Fdiv>\n\n  <!-- Two-column hero -->\n  <div class=\"hero-wrap\" style=\"position: absolute; inset: 0; z-index: 3; pointer-events: none; display: flex; align-items: center; padding: 0 56px; box-sizing: border-box; overflow-y: auto;\">\n    <div class=\"hero-grid\" style=\"width: 100%; max-width: 1360px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 34px 56px;\">\n\n      <!-- C1 -->\n      <div style=\"flex: 1 1 340px; min-width: 0;\">\n        <h1 class=\"hero-title\" style=\"font-family: 'Barlow Condensed', sans-serif; font-weight: 600; text-transform: uppercase; font-size: 92px; line-height: 0.9; letter-spacing: 0.004em; color: #6550a3; margin: 0;\">Alacrity<br><span style=\"color: #5863ff;\">Airbox<\u002Fspan><\u002Fh1>\n        <p class=\"hero-sub\" style=\"font-family: 'Barlow', sans-serif; font-weight: 600; font-size: 20px; line-height: 1.5; color: #525252; margin: 22px 0 0; max-width: 440px;\">The first citizen-science, open-data air quality monitoring solution in Romania.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- C2 -->\n      <div class=\"hero-cta\" style=\"flex: 0 1 auto;\">\n        <a class=\"hero-btn\" href=\"{{ seeDataUrl }}\" style=\"pointer-events: auto; cursor: pointer; border: none; text-decoration: none; display: inline-flex; align-items: center; gap: 18px; background: #5863ff; color: #FFFFFF; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; font-size: 34px; line-height: 1; white-space: nowrap; padding: 30px 46px; border-radius: 4px; transition: transform 220ms cubic-bezier(0.22,1,0.36,1), background 220ms cubic-bezier(0.22,1,0.36,1);\" style-hover=\"background: #3f4ae0; transform: translateY(-3px);\" style-active=\"transform: translateY(0);\">\n          See the data\n          <svg width=\"40\" height=\"24\" sc-camel-view-box=\"0 0 40 24\" fill=\"none\"><path d=\"M2 12 H36 M27 3 L37 12 L27 21\" stroke=\"#FFFFFF\" stroke-width=\"2.6\" stroke-linecap=\"square\" stroke-linejoin=\"miter\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n        <p style=\"font-family: 'Barlow', sans-serif; font-size: 16px; color: #525252; margin: 16px 2px 0;\">Or <a href=\"{{ readDocsUrl }}\" style=\"pointer-events: auto; color: #5863ff; text-decoration: none; border-bottom: 1px solid rgba(88,99,255,0.4); padding-bottom: 1px; transition: border-color 180ms ease;\" style-hover=\"border-bottom-color: #5863ff;\">read the docs<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;windIntensity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:2.6,&quot;min&quot;:0.2,&quot;max&quot;:2.6,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Vânt&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.4,&quot;min&quot;:0.3,&quot;max&quot;:2.2,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Vânt&quot;},&quot;morphSpeed&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:0.8,&quot;min&quot;:0.2,&quot;max&quot;:3,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Vânt&quot;},&quot;showContours&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Relief&quot;}}\">\nclass Component extends DCLogic {\n  // ===================================================================\n  //  LINKS — hardcode the three destination URLs here\n  // ===================================================================\n  static LINKS = {\n    seeData: \"/g/public-dashboards/geomap\",              // \"See the data\" button\n    readDocs: \"https://wiki.alacrity.ro/en/Projects/airbox-v2\",             // \"read the docs\" link\n    admin:    \"/g/login\",             // \"Administration area\" button\n  };\n\n  renderVals() {\n    const L = Component.LINKS;\n    return {\n      hostRef: (el) => { this.hostEl = el; },\n      baseRef: (el) => { this.baseCanvas = el; },\n      partRef: (el) => { this.partCanvas = el; },\n      seeDataUrl: L.seeData,\n      readDocsUrl: L.readDocs,\n      adminUrl: L.admin,\n    };\n  }\n\n  // ---- Perlin 3D noise ----\n  buildNoise() {\n    const perm = new Uint8Array(512);\n    const p = Array.from({ length: 256 }, (_, i) => i);\n    for (let i = 255; i > 0; i--) {\n      const j = (Math.random() * (i + 1)) | 0;\n      const t = p[i]; p[i] = p[j]; p[j] = t;\n    }\n    for (let i = 0; i < 512; i++) perm[i] = p[i & 255];\n    const fade = (t) => t * t * t * (t * (t * 6 - 15) + 10);\n    const lerp = (a, b, t) => a + t * (b - a);\n    const grad = (h, x, y, z) => {\n      h &= 15;\n      const u = h < 8 ? x : y;\n      const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);\n      return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);\n    };\n    this.noise = (x, y, z) => {\n      const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;\n      x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);\n      const u = fade(x), v = fade(y), w = fade(z);\n      const A = perm[X] + Y, AA = perm[A] + Z, AB = perm[A + 1] + Z;\n      const B = perm[X + 1] + Y, BA = perm[B] + Z, BB = perm[B + 1] + Z;\n      return lerp(\n        lerp(lerp(grad(perm[AA], x, y, z), grad(perm[BA], x - 1, y, z), u),\n             lerp(grad(perm[AB], x, y - 1, z), grad(perm[BB], x - 1, y - 1, z), u), v),\n        lerp(lerp(grad(perm[AA + 1], x, y, z - 1), grad(perm[BA + 1], x - 1, y, z - 1), u),\n             lerp(grad(perm[AB + 1], x, y - 1, z - 1), grad(perm[BB + 1], x - 1, y - 1, z - 1), u), v),\n        w);\n    };\n  }\n\n  fbm(x, y, z) {\n    let a = 0, amp = 0.5, f = 1;\n    for (let o = 0; o < 4; o++) { a += amp * this.noise(x * f, y * f, z); f *= 2; amp *= 0.5; }\n    return a;\n  }\n\n  componentDidMount() {\n    this.buildNoise();\n\n    const HS = 0.00085;  // heightmap spatial scale (larger patterns)\n    const FS = 0.0015;   // flow-field spatial scale (larger patterns)\n    const SPDS = 0.0011; // speed-zone spatial scale (slow/fast regions)\n    const CELL = 16;     // contour grid cell (css px)\n    const FCELL = 22;    // flow/height lookup grid cell (css px)\n    const FIELD_INTERVAL = 6; // recompute the noise field every N frames\n    const LEVELS = [];\n    for (let i = 0; i < 13; i++) LEVELS.push(-0.6 + i * (1.2 / 12));\n    // marching-squares edge table (bits: tl=8 tr=4 br=2 bl=1; edges T0 R1 B2 L3)\n    const MS = {\n      1: [[2, 3]], 2: [[1, 2]], 3: [[1, 3]], 4: [[0, 1]],\n      5: [[0, 1], [2, 3]], 6: [[0, 2]], 7: [[0, 3]], 8: [[0, 3]],\n      9: [[0, 2]], 10: [[0, 3], [1, 2]], 11: [[0, 1]], 12: [[1, 3]],\n      13: [[1, 2]], 14: [[2, 3]],\n    };\n\n    const cyan = [30, 70, 255];\n    const coral = [235, 24, 18];\n\n    // Precomputed color buckets — particles are batched into these so we make\n    // ~NBINS stroke() calls per frame instead of one per particle.\n    const NBINS = 14;\n    const binRGB = new Array(NBINS);\n    const binWidth = new Array(NBINS);\n    for (let k = 0; k < NBINS; k++) {\n      const t = (k + 0.5) / NBINS;\n      const r = Math.round(cyan[0] + (coral[0] - cyan[0]) * t);\n      const g = Math.round(cyan[1] + (coral[1] - cyan[1]) * t);\n      const b = Math.round(cyan[2] + (coral[2] - cyan[2]) * t);\n      binRGB[k] = r + ',' + g + ',' + b;\n      binWidth[k] = 0.7 + t * 1.4;\n    }\n\n    // Color LUT: remap elevation so the greyish cyan/coral MIDPOINT is skipped\n    // entirely — cyan side compresses to a saturated blue, and anything past the\n    // split jumps quickly to high-contrast red (no muddy grey in between).\n    const CLUT = new Float32Array(256);\n    const THRESH = 0.56; // share of the range that maps to the cyan side (lower = more red)\n    const LOW = 0.40;    // cyan side output ceiling (0..LOW)\n    const HIGH = 0.60;   // coral side output floor (HIGH..1) — the gap is [LOW,HIGH]\n    const GAIN_C = 1.5;  // cyan push toward blue (gentler = smoother blend)\n    const RISE = 0.85;   // <1 = coral side leans to red, but softly\n    for (let k = 0; k < 256; k++) {\n      const x = k / 255;\n      if (x < THRESH) {\n        const u = Math.pow(x / THRESH, GAIN_C);\n        CLUT[k] = u * LOW;\n      } else {\n        const u = Math.pow((x - THRESH) / (1 - THRESH), RISE);\n        CLUT[k] = HIGH + u * (1 - HIGH);\n      }\n    }\n\n    const bctx = this.baseCanvas.getContext('2d');\n    const pctx = this.partCanvas.getContext('2d');\n    let W = 0, H = 0, dpr = 1;\n    let cols = 0, rows = 0, grid = null;      // contour sampling grid\n    let fcols = 0, frows = 0;                  // flow/height field grid\n    let fAng = null, fH = null, fSpd = null;   // cached noise scalars\n    let particles = [];\n\n    const TRAIL = 120;    // points of trailing history each particle keeps\n    const FADE_IN = 40;   // frames to fade a comet in on spawn\n    const FADE_OUT = 34;  // frames a culled comet takes to fade away\n    const spawn = (p) => {\n      let bx, by;\n      if (!fSpd || Math.random() < 0.25) {\n        // smaller uniform run — keeps calm areas from going empty\n        bx = Math.random() * W; by = Math.random() * H;\n      } else {\n        // biased run — keep the fastest of a few candidates\n        bx = Math.random() * W; by = Math.random() * H;\n        let bs = sampleField(fSpd, bx, by);\n        const CAND = 4;\n        for (let c = 1; c < CAND; c++) {\n          const cx = Math.random() * W, cy = Math.random() * H;\n          const s = sampleField(fSpd, cx, cy);\n          if (s > bs) { bs = s; bx = cx; by = cy; }\n        }\n      }\n      p.x = bx; p.y = by;\n      p.a
