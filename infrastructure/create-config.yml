---
- import_playbook: create-mounts.yml

- name: Create airbox configuration files
  hosts: localhost
  gather_facts: false

  vars:
    project_dir: "{{ playbook_dir }}"

  tasks:
    - name: Read .env file
      ansible.builtin.slurp:
        src: "{{ project_dir }}/.env"
      register: env_raw

    - name: Parse .env into variables
      ansible.builtin.set_fact:
        env_vars: "{{ dict(env_raw.content | b64decode | regex_findall('(?m)^([A-Za-z_][A-Za-z0-9_]*)=(.+)$')) }}"

    - name: Set convenience variables
      ansible.builtin.set_fact:
        data_path: "{{ env_vars.AIRBOX_DATA_PATH }}"
        grafana_host: "{{ env_vars.GRAFANA_DOMAIN | regex_replace('^https?://', '') }}"
        tsdb_user: "{{ env_vars.TSDB_USER }}"
        tsdb_pass: "{{ env_vars.TSDB_PASSWORD }}"
        tsdb_database: "{{ env_vars.TSDB_DATABASE }}"

    - name: Create Grafana datasource configuration
      ansible.builtin.template:
        src: templates/grafana-datasource.yml.j2
        dest: "{{ data_path }}/airbox-grafana-datasources/timescaledb.yml"
        owner: "{{ env_vars.AIRBOX_USER }}"
        group: "{{ env_vars.AIRBOX_USER }}"
        mode: "0644"
      become: true

    - name: Remove old Prometheus datasource if present
      ansible.builtin.file:
        path: "{{ data_path }}/airbox-grafana-datasources/prometheus.yml"
        state: absent
      become: true

    - name: Create landing page directory
      ansible.builtin.file:
        path: "{{ data_path }}/airbox-landing"
        state: directory
        owner: "{{ env_vars.AIRBOX_USER }}"
        group: "{{ env_vars.AIRBOX_USER }}"
        mode: "0755"
      become: true

    - name: Create landing page index.html
      # Static copy, not template: the page is a self-contained design export whose
      # JavaScript contains {{ ... }} sequences that Jinja would try to evaluate.
      ansible.builtin.copy:
        src: templates/landing-index.html
        dest: "{{ data_path }}/airbox-landing/index.html"
        owner: "{{ env_vars.AIRBOX_USER }}"
        group: "{{ env_vars.AIRBOX_USER }}"
        mode: "0644"
      become: true

    # Grafana dashboards are provisioned via the API (provision-dashboards.yml) from the
    # single canonical source middleware/grafana/dashboards/, so the former file-copy
    # and drift-guard tasks are obsolete and have been removed. Datasource provisioning
    # (timescaledb.yml) stays file-based, above.
