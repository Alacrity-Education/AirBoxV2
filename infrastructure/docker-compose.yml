services:
  grafana:
    image: grafana/grafana:latest
    container_name: airbox-grafana
    restart: unless-stopped
    user: "${AIRBOX_USER}"
    ports:
      - "3009:3000"
    volumes:
      - ${AIRBOX_DATA_PATH}/airbox-grafana-data:/var/lib/grafana
      - ${AIRBOX_DATA_PATH}/airbox-grafana-datasources:/etc/grafana/provisioning/datasources
      - ${AIRBOX_DATA_PATH}/airbox-grafana-dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_PATHS_DATA=/var/lib/grafana
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN}
      - GF_SERVER_ROOT_URL=${GRAFANA_DOMAIN}
      # Disable registration and anonymous access regardless of auth method
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # OIDC via generic OAuth — controlled by GRAFANA_OIDC_ENABLED
      # When true: OIDC is the only login method; login form is hidden
      # When false: default username/password login form is active
      - GF_AUTH_DISABLE_LOGIN_FORM=${GRAFANA_OIDC_ENABLED}
      - GF_AUTH_GENERIC_OAUTH_ENABLED=${GRAFANA_OIDC_ENABLED}
      - GF_AUTH_GENERIC_OAUTH_NAME=SSO
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GRAFANA_OIDC_CLIENT_ID}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GRAFANA_OIDC_CLIENT_SECRET}
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=${GRAFANA_OIDC_AUTH_URL}
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=${GRAFANA_OIDC_TOKEN_URL}
      - GF_AUTH_GENERIC_OAUTH_API_URL=${GRAFANA_OIDC_API_URL}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=${GRAFANA_OIDC_SCOPES}
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(groups[*], 'Board') && 'GrafanaAdmin' || contains(groups[*], 'Volunteers') && 'Editor' || 'Viewer'
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT=true
      - GF_AUTH_GENERIC_OAUTH_USE_PKCE=true
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    container_name: airbox-prometheus
    restart: unless-stopped
    user: "${AIRBOX_USER}"
    volumes:
      - ${AIRBOX_DATA_PATH}/airbox-prometheus-config:/etc/prometheus
      - ${AIRBOX_DATA_PATH}/airbox-prometheus-storage:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=1y"

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: airbox-mosquitto
    restart: unless-stopped
    user: "${AIRBOX_USER}"
    ports:
      - "1883:1883"
      - "127.0.0.1:9001:9001"
    volumes:
      - ${AIRBOX_DATA_PATH}/airbox-mosquitto-config:/mosquitto/config

  telegraf:
    image: telegraf:latest
    container_name: airbox-telegraf
    restart: unless-stopped
    user: "${AIRBOX_USER}"
    volumes:
      - ${AIRBOX_DATA_PATH}/airbox-telegraf-config:/etc/telegraf
    depends_on:
      - prometheus
      - mosquitto

  mock:
    build: ./mock
    container_name: airbox-mock
    restart: unless-stopped
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    depends_on:
      - mosquitto
