services:
  grafana:
    image: grafana/grafana:13.1.0
    container_name: airbox-grafana
    restart: unless-stopped
    user: "${AIRBOX_USER}"
    ports:
      - "3009:3000"
    volumes:
      - ${AIRBOX_DATA_PATH}/airbox-grafana-data:/var/lib/grafana
      - ${AIRBOX_DATA_PATH}/airbox-grafana-datasources:/etc/grafana/provisioning/datasources
      # Dashboards are provisioned via the Grafana API by provision-dashboards.yml
      # (not file-based) so admin UI edits are durable. Datasources stay file-based above.
      # The org home dashboard is set via /api/org/preferences by that same playbook.
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=${GRAFANA_PLUGINS}
      - GF_PATHS_DATA=/var/lib/grafana
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN}
      - GF_SERVER_ROOT_URL=${GRAFANA_DOMAIN}/g/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      # Pin the public-dashboards API on explicitly (do not rely on the 13.1.0 image default):
      # the middleware's public-dashboard token scheme depends on this API accepting a
      # client-supplied HMAC access token. A future image bump must re-verify this.
      - GF_PUBLIC_DASHBOARDS_ENABLED=true
      # Disable registration and anonymous access regardless of auth method
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_DEFAULT_THEME=light
      - GF_AUTH_ANONYMOUS_ENABLED=false
      # OIDC via generic OAuth — controlled by GRAFANA_OIDC_ENABLED
      # When true: OIDC is the only login method; login form is hidden
      # When false: default username/password login form is active
      - GF_AUTH_DISABLE_LOGIN_FORM=${GRAFANA_OIDC_ENABLED}
      - GF_AUTH_GENERIC_OAUTH_ENABLED=${GRAFANA_OIDC_ENABLED}
      - GF_AUTH_GENERIC_OAUTH_NAME=SSO
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${GRAFANA_OIDC_CLIENT_ID}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GRAFANA_OIDC_CLIENT_SECRET}
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=${GRAFANA_OIDC_AUTH_URL}
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=${GRAFANA_OIDC_TOKEN_URL}
      - GF_AUTH_GENERIC_OAUTH_API_URL=${GRAFANA_OIDC_API_URL}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=${GRAFANA_OIDC_SCOPES}
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(groups[*], 'Board') && 'GrafanaAdmin' || contains(groups[*], 'Volunteers') && 'Editor' || 'Viewer'
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT=true
      - GF_AUTH_GENERIC_OAUTH_USE_PKCE=true
    depends_on:
      timescaledb:
        condition: service_healthy

  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: airbox-timescaledb
    restart: unless-stopped
    user: "${AIRBOX_USER}"
    volumes:
      - ${AIRBOX_DATA_PATH}/airbox-timescaledb-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${TSDB_DATABASE}
      - POSTGRES_USER=${TSDB_USER}
      - POSTGRES_PASSWORD=${TSDB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TSDB_USER} -d ${TSDB_DATABASE}"]
      interval: 5s
      timeout: 3s
      retries: 10

  middleware:
    build: ../new-middleware
    container_name: airbox-middleware
    restart: unless-stopped
    environment:
      - MDW_DB_URL=jdbc:postgresql://timescaledb:5432/${TSDB_DATABASE}
      - MDW_DB_USERNAME=${TSDB_USER}
      - MDW_DB_PASSWORD=${TSDB_PASSWORD}
      - MDW_SERVER_PORT=${MDW_SERVER_PORT}
      - MDW_GRAFANA_SYNC_ENABLED=true
      - MDW_GRAFANA_URL=http://grafana:3000
      - MDW_GRAFANA_PUBLIC_URL=${GRAFANA_DOMAIN}/g
      - MDW_GRAFANA_USER=admin
      - MDW_GRAFANA_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - MDW_PUBLIC_TOKEN_SECRET=${MDW_PUBLIC_TOKEN_SECRET}
      # Mock-installation seed gate — driven by the AIRBOX_MOCKS_ENABLED switch in .env.
      # Feeds the V3 Flyway placeholder; only takes effect when V3 first runs on a fresh DB.
      - MDW_SEED_MOCK_INSTALLATIONS=${AIRBOX_MOCKS_ENABLED:-true}
      # INVARIANT: this geomap uid MUST stay identical to the root `uid` in
      # airbox-geomap.json (~line 329) and to every `/d/<uid>` nav link across all dashboard
      # JSON in BOTH new-middleware/src/main/resources/grafana-templates/ and
      # new-middleware/grafana/dashboards/ (now the single canonical dashboard source).
      # A one-sided edit silently breaks the map's public URL and every nav link.
      # airbox-geomap.json is the canonical authority.
      - MDW_GRAFANA_MAP_UID=9f08aae7-e794-402e-8a13-044578bfab39
      # uids of the LIVE source dashboards the public twins are generated from (fetched from
      # Grafana each sync and transformed, same flow as the geomap). Must match the root `uid`
      # of the matching provisioned JSON under grafana/dashboards/ (the canonical source).
      - MDW_GRAFANA_OVERVIEW_UID=airbox-overview
      - MDW_GRAFANA_STATION_UID=airbox-station
    ports:
      - "8080:8080"
    depends_on:
      timescaledb:
        condition: service_healthy
      grafana:
        condition: service_started

  mock:
    build: ../new-middleware/mock-firmware
    container_name: airbox-mock
    restart: unless-stopped
    # Mock container gated by the AIRBOX_MOCKS_ENABLED switch (see .env). The interpolated
    # profile name equals the fixed COMPOSE_PROFILES value ("true") only when mocks are
    # enabled; when AIRBOX_MOCKS_ENABLED=false the profile becomes "false" and never matches,
    # so this service is excluded from `docker compose up`/`config`.
    profiles: ["${AIRBOX_MOCKS_ENABLED:-true}"]
    environment:
      - AIRBOX_ENDPOINT=${AIRBOX_ENDPOINT}
      - AIRBOX_API_KEYS=${AIRBOX_API_KEYS}
      - AIRBOX_GEOHASHES=${AIRBOX_GEOHASHES}
      - AIRBOX_INTERVAL_SECONDS=${AIRBOX_INTERVAL_SECONDS}
      - AIRBOX_REQUEST_COUNT=${AIRBOX_REQUEST_COUNT}
      - AIRBOX_AUTH_STYLE=${AIRBOX_AUTH_STYLE}
    depends_on:
      - middleware
