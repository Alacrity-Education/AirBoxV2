spring.application.name=new-middleware
spring.datasource.url=${MDW_DB_URL}
spring.datasource.username=${MDW_DB_USERNAME}
spring.datasource.password=${MDW_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
server.port=${MDW_SERVER_PORT:8080}

# Flyway placeholder gating the V3 mock-installation seed. Fed by MDW_SEED_MOCK_INSTALLATIONS
# (which the compose file wires to AIRBOX_MOCKS_ENABLED); defaults to true for bare runs.
# Resolves into V3's "WHERE ${seed_mock_installations}" (i.e. WHERE true / WHERE false).
# NOTE: this is a deployment-time switch, evaluated when V3 first runs on a fresh DB.
spring.flyway.placeholders.seed_mock_installations=${MDW_SEED_MOCK_INSTALLATIONS:true}


# --- Grafana dashboard sync (default OFF: bare compose & H2 tests have no Grafana) ---
mdw.grafana.sync.enabled=${MDW_GRAFANA_SYNC_ENABLED:false}
# hourly
mdw.grafana.sync.cron=${MDW_GRAFANA_SYNC_CRON:0 0 * * * *}
mdw.grafana.url=${MDW_GRAFANA_URL:http://grafana:3000}
mdw.grafana.public-url=${MDW_GRAFANA_PUBLIC_URL:http://localhost:3000}
# service-account token, preferred
mdw.grafana.token=${MDW_GRAFANA_TOKEN:}
# basic-auth fallback
mdw.grafana.username=${MDW_GRAFANA_USER:admin}
mdw.grafana.password=${MDW_GRAFANA_PASSWORD:}
# Optional override dir for the nav_panels.json chrome fragment ONLY. The public twins
# (overview + station views) are now generated from the LIVE source dashboards fetched from
# Grafana (see the *-uid properties below), not from jar-baked templates; this dir no longer
# overrides any source dashboard, only the twin-specific navigation panels injected at the top.
mdw.grafana.templates-dir=${MDW_GRAFANA_TEMPLATES_DIR:}
mdw.grafana.public-token-secret=${MDW_PUBLIC_TOKEN_SECRET:}
# uid of the provisioned geomap dashboard (shared publicly as-is, no generated copy)
# INVARIANT: this geomap uid MUST stay identical to the root "uid" in airbox-geomap.json
# (grafana/dashboards/airbox-geomap.json, ~line 329) AND to every /d/<uid> nav link across
# every dashboard JSON under grafana-templates/ and grafana/dashboards/ (and the infra copy).
# A one-sided edit silently breaks the map's public URL and every nav link. Keep this default,
# the docker-compose.yml MDW_GRAFANA_MAP_UID value, and all those JSON sites in lockstep.
mdw.grafana.map-uid=${MDW_GRAFANA_MAP_UID:9f08aae7-e794-402e-8a13-044578bfab39}
# uids of the LIVE provisioned source dashboards the public twins are generated from. Each is
# fetched once per sync run via GET /api/dashboards/uid/{uid}, transformed (device variable
# removed, ${device:sqlstring} resolved, nav panels injected, owner_email PII stripped, new
# identity + airbox-generated tag) and upserted as a public twin — same live-source flow as the
# geomap. Defaults mirror the provisioned dashboard uids under grafana/dashboards/.
# INVARIANT: keep each default identical to the root "uid" of the matching source JSON.
mdw.grafana.overview-uid=${MDW_GRAFANA_OVERVIEW_UID:airbox-overview}
# uid of the single LIVE per-device station source (the combined AirBox Station dashboard),
# fetched once per sync and transformed into one public twin per device.
mdw.grafana.station-uid=${MDW_GRAFANA_STATION_UID:airbox-station}