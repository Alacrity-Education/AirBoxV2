spring.application.name=new-middleware
spring.datasource.url=${MDW_DB_URL}
spring.datasource.username=${MDW_DB_USERNAME}
spring.datasource.password=${MDW_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
server.port=${MDW_SERVER_PORT:8080}


# --- Grafana dashboard sync (default OFF: bare compose & H2 tests have no Grafana) ---
mdw.grafana.sync.enabled=${MDW_GRAFANA_SYNC_ENABLED:false}
# hourly
mdw.grafana.sync.cron=${MDW_GRAFANA_SYNC_CRON:0 0 * * * *}
mdw.grafana.url=${MDW_GRAFANA_URL:http://grafana:3000}
mdw.grafana.public-url=${MDW_GRAFANA_PUBLIC_URL:http://localhost:3000}
# service-account token, preferred
mdw.grafana.token=${MDW_GRAFANA_TOKEN:}
# basic-auth fallback
mdw.grafana.username=${MDW_GRAFANA_USER:admin}
mdw.grafana.password=${MDW_GRAFANA_PASSWORD:}
mdw.grafana.templates-dir=${MDW_GRAFANA_TEMPLATES_DIR:}
mdw.grafana.public-token-secret=${MDW_PUBLIC_TOKEN_SECRET:}
# uid of the provisioned geomap dashboard (shared publicly as-is, no generated copy)
mdw.grafana.map-uid=${MDW_GRAFANA_MAP_UID:9f08aae7-e794-402e-8a13-044578bfab39}