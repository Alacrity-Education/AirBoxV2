spring.application.name=new-middleware

# Mock in-memory H2 database, run in PostgreSQL compatibility mode so the
# repository SQL (lower-case identifiers, boolean/real handling) behaves like prod.
# DB_CLOSE_DELAY=-1 keeps the in-memory DB alive for the whole test JVM.
spring.datasource.url=jdbc:h2:mem:airbox;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Flyway drives the schema from the H2-compatible migrations on the test classpath.
# These live in their own folder (db/h2migration) so they don't collide with the
# production Postgres/TimescaleDB migrations under db/migration, which are also on
# the classpath and contain Timescale-only DDL that H2 cannot run.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/h2migration

# We hand-write all DDL via Flyway; Hibernate must not touch the schema.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
