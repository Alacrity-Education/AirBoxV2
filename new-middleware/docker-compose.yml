services:
  db:
    image: timescale/timescaledb:2.15.3-pg16
    environment:
      POSTGRES_DB: airbox
      POSTGRES_USER: airbox
      POSTGRES_PASSWORD: airbox
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airbox -d airbox"]
      interval: 5s
      timeout: 5s
      retries: 10

  middleware:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MDW_DB_URL: jdbc:postgresql://db:5432/airbox
      MDW_DB_USERNAME: airbox
      MDW_DB_PASSWORD: airbox
      MDW_SERVER_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  mock-firmware:
    build:
      context: ./mock-firmware
      dockerfile: Dockerfile
    environment:
      AIRBOX_ENDPOINT: http://middleware:8080/api/v2/submit
      AIRBOX_API_KEYS: "mockkey-3f9a1c2b8e7d4056,mockkey-7b2e5f0a9c1d3468,mockkey-a1c4d8e2f6b09357,mockkey-9d0f3a7c1e5b2864"
      AIRBOX_INTERVAL_SECONDS: "10"
    depends_on:
      - middleware

volumes:
  db-data:
