; AirBox V2 — solar powered air quality station
; MCU module: WeMos/LOLIN S2 mini (ESP32-S2FN4R2)
;
; Build:   pio run
; Flash:   pio run -t upload      (put the S2 mini in bootloader mode: hold 0, tap RST)
; Monitor: pio device monitor

[env:lolin_s2_mini]
platform = espressif32
board = lolin_s2_mini
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -Wall
lib_deps =
    sensirion/Sensirion I2C SEN66@^1.3.1
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^4.0.6
